<svg width="1280" height="360" viewBox="0 0 1280 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">aether-indexer banner</title>
  <desc id="desc">A banner showing an EVM indexing pipeline from RPC to PostgreSQL and API consumers.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="0.52" stop-color="#0A2430"/>
      <stop offset="1" stop-color="#102E2B"/>
    </linearGradient>
    <linearGradient id="accent" x1="164" y1="92" x2="1042" y2="291" gradientUnits="userSpaceOnUse">
      <stop stop-color="#74D3AE"/>
      <stop offset="0.5" stop-color="#64B6F7"/>
      <stop offset="1" stop-color="#F2C879"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1280" height="360" rx="24" fill="url(#bg)"/>
  <path d="M81 283C186 189 267 214 370 154C478 91 574 73 675 127C760 173 835 187 944 123C1035 70 1125 83 1205 159" stroke="url(#accent)" stroke-width="2" opacity="0.38"/>
  <path d="M74 301C187 231 289 250 421 184C548 121 639 132 753 188C861 241 939 234 1048 173C1112 137 1166 139 1214 163" stroke="#74D3AE" stroke-width="1.5" opacity="0.16"/>

  <g filter="url(#softShadow)">
    <rect x="64" y="62" width="1152" height="236" rx="20" fill="#0B1724" fill-opacity="0.72" stroke="#24384A"/>
  </g>

  <g transform="translate(96 94)">
    <text x="0" y="48" fill="#F4F7FA" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="52" font-weight="760" letter-spacing="0">aether-indexer</text>
    <text x="2" y="86" fill="#AAC0CF" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="20" font-weight="450">Rust EVM indexer for token transfers, NFT ownership, holders, and metadata refresh</text>
  </g>

  <g transform="translate(95 208)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" font-weight="650">
    <rect x="0" y="0" width="142" height="44" rx="10" fill="#10283A" stroke="#284C63"/>
    <text x="31" y="28" fill="#DDF7EF">EVM RPC</text>

    <path d="M154 22H224" stroke="#64B6F7" stroke-width="2"/>
    <path d="M216 14L224 22L216 30" stroke="#64B6F7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="238" y="0" width="152" height="44" rx="10" fill="#10283A" stroke="#284C63"/>
    <text x="263" y="28" fill="#DDF7EF">Parser</text>

    <path d="M402 22H472" stroke="#64B6F7" stroke-width="2"/>
    <path d="M464 14L472 22L464 30" stroke="#64B6F7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="486" y="0" width="168" height="44" rx="10" fill="#10283A" stroke="#284C63"/>
    <text x="517" y="28" fill="#DDF7EF">PostgreSQL</text>

    <path d="M666 22H736" stroke="#64B6F7" stroke-width="2"/>
    <path d="M728 14L736 22L728 30" stroke="#64B6F7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="750" y="0" width="146" height="44" rx="10" fill="#10283A" stroke="#284C63"/>
    <text x="794" y="28" fill="#DDF7EF">API</text>

    <path d="M908 22H978" stroke="#64B6F7" stroke-width="2"/>
    <path d="M970 14L978 22L970 30" stroke="#64B6F7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="992" y="0" width="124" height="44" rx="10" fill="#10283A" stroke="#284C63"/>
    <text x="1028" y="28" fill="#DDF7EF">Apps</text>
  </g>

  <g transform="translate(902 90)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <rect x="0" y="0" width="252" height="86" rx="16" fill="#0F2B2A" stroke="#346459"/>
    <text x="22" y="34" fill="#F4F7FA" font-size="18" font-weight="740">Indexes only events you need</text>
    <text x="22" y="61" fill="#AFC7C0" font-size="14" font-weight="500">ERC-20, ERC-721, ERC-1155</text>
  </g>
